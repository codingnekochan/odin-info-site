<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0e0e;
      --surface: #161616;
      --border:  #2a2a2a;
      --accent:  #c8f04d;
      --text:    #e8e8e0;
      --muted:   #666;
      --serif:   'DM Serif Display', Georgia, serif;
      --sans:    'DM Sans', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(14,14,14,.85);
      backdrop-filter: blur(12px);
    }

    nav .logo {
      font-family: var(--serif);
      font-size: 1.2rem;
      color: var(--accent);
      text-decoration: none;
    }

    nav ul { list-style: none; display: flex; gap: 2.5rem; }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: .85rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: color .2s;
    }

    nav a:hover { color: var(--text); }

    .hero {
      text-align: center;
      max-width: 640px;
      animation: fadeUp .9s ease both;
    }

    .badge {
      display: inline-block;
      font-size: .7rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: .35rem .9rem;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 1.05;
      margin-bottom: 1.5rem;
    }

    h1 em { font-style: italic; color: var(--accent); }

    .tagline {
      font-size: 1.05rem;
      color: #999;
      line-height: 1.7;
      margin-bottom: 3.5rem;
    }

    .nav-links {
      display: flex;
      gap: 1px;
      justify-content: center;
    }

    .nav-links a {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: 1rem 2.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-size: .85rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: background .2s, color .2s, transform .2s;
    }

    .nav-links a:hover {
      background: #1e1e1e;
      color: var(--accent);
      transform: translateY(-3px);
    }

    .nav-links a.primary {
      background: var(--accent);
      color: #0e0e0e;
      border-color: var(--accent);
      font-weight: 500;
    }

    .nav-links a.primary:hover { opacity: .85; color: #0e0e0e; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { flex-direction: column; width: 100%; }
      .nav-links a { justify-content: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/">MO.</a>
    <ul>
      <li><a href="/about">About</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>

  <main class="hero">
    <span class="badge">Available for freelance</span>
    <h1>React Native<br><em>developer.</em></h1>
    <p class="tagline">
      I build clean, thoughtful mobile experiences.<br>
      Self-taught. Deliberate. Always shipping.
    </p>
    <div class="nav-links">
      <a href="/about" class="primary">About me</a>
      <a href="/contact">Get in touch</a>
    </div>
  </main>

</body>
</html>
