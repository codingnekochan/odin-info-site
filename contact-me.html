<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0e;
      --surface:   #161616;
      --border:    #2a2a2a;
      --accent:    #c8f04d;
      --text:      #e8e8e0;
      --muted:     #666;
      --serif:     'DM Serif Display', Georgia, serif;
      --sans:      'DM Sans', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(14,14,14,.85);
      backdrop-filter: blur(12px);
    }

    nav .logo {
      font-family: var(--serif);
      font-size: 1.2rem;
      color: var(--accent);
      text-decoration: none;
    }

    nav ul { list-style: none; display: flex; gap: 2.5rem; }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: .85rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: color .2s;
    }

    nav a:hover { color: var(--text); }
    nav a.active { color: var(--accent); }

    /* ── LAYOUT ── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 13rem 3rem 6rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      animation: fadeUp .8s ease both;
    }

    /* ── LEFT ── */
    .eyebrow {
      font-size: .75rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    h1 em { font-style: italic; color: var(--accent); }

    .intro {
      color: #aaa;
      font-size: 1rem;
      margin-bottom: 3rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1px;
      border: 1px solid var(--border);
    }

    .link-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      background: var(--surface);
      text-decoration: none;
      color: var(--text);
      transition: background .2s, color .2s;
      border-bottom: 1px solid var(--border);
    }

    .link-item:last-child { border-bottom: none; }

    .link-item:hover {
      background: #1e1e1e;
      color: var(--accent);
    }

    .link-item span:first-child {
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .link-item:hover span:first-child { color: var(--accent); }

    .link-item span:last-child {
      font-size: .8rem;
      color: var(--muted);
    }

    /* ── RIGHT (FORM) ── */
    form { display: flex; flex-direction: column; gap: 1.5rem; }

    .field { display: flex; flex-direction: column; gap: .5rem; }

    label {
      font-size: .7rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input, textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: .95rem;
      font-weight: 300;
      padding: .9rem 1rem;
      outline: none;
      transition: border-color .2s;
      resize: none;
      width: 100%;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
    }

    input::placeholder, textarea::placeholder {
      color: var(--muted);
      font-size: .85rem;
    }

    textarea { height: 130px; }

    button[type="submit"] {
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      padding: 1rem 2rem;
      font-family: var(--sans);
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity .2s, transform .2s;
      align-self: flex-start;
    }

    button[type="submit"]:hover { opacity: .85; transform: translateY(-2px); }

    /* success message (JS toggled) */
    .success {
      display: none;
      padding: 1rem 1.25rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: .9rem;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      nav { padding: 1rem 1.5rem; }
      .page {
        grid-template-columns: 1fr;
        gap: 3rem;
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/">MO.</a>
    <ul>
      <li><a href="/about">About</a></li>
      <li><a href="/contact" class="active">Contact</a></li>
    </ul>
  </nav>

  <div class="page">

    <!-- LEFT -->
    <div>
      <p class="eyebrow">Say hello</p>
      <h1>Let's work<br><em>together.</em></h1>
      <p class="intro">Open to freelance projects, collaborations, and interesting conversations. Drop a message or find me below.</p>

      <div class="links">
        <a class="link-item" href="mailto:hello@example.com">
          <span>Email</span><span>→</span>
        </a>
        <a class="link-item" href="https://github.com/" target="_blank" rel="noopener">
          <span>GitHub</span><span>→</span>
        </a>
        <a class="link-item" href="https://linkedin.com/" target="_blank" rel="noopener">
          <span>LinkedIn</span><span>→</span>
        </a>
        <a class="link-item" href="https://twitter.com/" target="_blank" rel="noopener">
          <span>Twitter / X</span><span>→</span>
        </a>
      </div>
    </div>

    <!-- RIGHT -->
    <div>
      <form id="contactForm" novalidate>
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="What are you working on?" required></textarea>
        </div>

        <div class="success" id="successMsg">Message sent — I'll get back to you soon.</div>

        <button type="submit">Send message</button>
      </form>
    </div>

  </div>

  <script>
    // Demo form handler — swap with a real POST in your Node server
    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const btn = this.querySelector('button[type="submit"]');
      btn.textContent = 'Sending…';
      btn.disabled = true;

      // Simulate async send (replace with fetch('/contact', { method: 'POST', ... }))
      setTimeout(() => {
        this.reset();
        btn.style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      }, 1200);
    });
  </script>

</body>
</html>
